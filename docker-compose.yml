services:
  engfreq:
    build:
      context: .
      dockerfile: Dockerfile
    image: engfreq:latest
    container_name: engfreq
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      # Override in .env or here; falls back to sensible defaults.
      # NOTE: every path lives under /app/data so a single named volume covers
      # uploads, exports, OCR cache, persisted file copies, the SQLite DB, AND
      # migration backups — making one-click server migration trivial.
      HOST: 0.0.0.0
      PORT: 8000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      DB_PATH: /app/data/app.db
      UPLOAD_DIR: /app/data/uploads
      RESULTS_DIR: /app/data/exports
      OCR_CACHE_DIR: /app/data/ocr_cache
      FILE_STORE_DIR: /app/data/files
      AI_MODEL: ${AI_MODEL:-claude-opus-4-7}
      AI_BATCH_SIZE: ${AI_BATCH_SIZE:-25}
      AI_PROMPT_CACHING: ${AI_PROMPT_CACHING:-true}
      VOCAB_PROVIDER: ${VOCAB_PROVIDER:-free_dict}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      MERRIAM_WEBSTER_KEY: ${MERRIAM_WEBSTER_KEY:-}
      YOUDAO_APP_KEY: ${YOUDAO_APP_KEY:-}
      YOUDAO_APP_SECRET: ${YOUDAO_APP_SECRET:-}
      PROMPT_DOMAIN: ${PROMPT_DOMAIN:-gaokao}
      PROMPT_VERSION: ${PROMPT_VERSION:-v2}
      LLM_RETRY_ATTEMPTS: ${LLM_RETRY_ATTEMPTS:-3}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      SECURITY_HEADERS_ENABLED: ${SECURITY_HEADERS_ENABLED:-true}
      HSTS_ENABLED: ${HSTS_ENABLED:-false}
    volumes:
      # Single persistent volume covers DB + every data subdirectory.
      - engfreq-data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  engfreq-data:
